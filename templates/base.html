<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ SITE_NAME }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --mf-primary: #6366f1;
            --mf-primary-dark: #4f46e5;
            --mf-bg: #f8fafc;
            --mf-sidebar: #1e1b4b;
        }
        body { background: var(--mf-bg); font-family: 'Inter', system-ui, sans-serif; }
        .sidebar {
            background: var(--mf-sidebar);
            min-height: 100vh;
            width: 260px;
            position: fixed;
            top: 0; left: 0;
            padding-top: 1rem;
            transition: transform 0.3s;
            z-index: 1000;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            margin: 0.1rem 0.5rem;
            font-size: 0.9rem;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link i { width: 1.5rem; }
        .sidebar-brand {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 0.5rem 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sidebar-brand i { color: var(--mf-primary); font-size: 1.5rem; }
        .sidebar-section {
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 1rem 1.2rem 0.3rem;
        }
        .main-content { margin-left: 260px; padding: 1.5rem; }
        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.75rem 1.5rem;
            margin: -1.5rem -1.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-card {
            background: #fff;
            border-radius: 0.75rem;
            padding: 1.25rem;
            border: 1px solid #e2e8f0;
        }
        .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; color: #1e293b; }
        .stat-card .stat-label { font-size: 0.85rem; color: #64748b; }
        .stat-card .stat-icon {
            width: 48px; height: 48px;
            border-radius: 0.75rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .card { border: 1px solid #e2e8f0; border-radius: 0.75rem; }
        .card-header { background: #fff; border-bottom: 1px solid #e2e8f0; }
        .btn-primary { background: var(--mf-primary); border-color: var(--mf-primary); }
        .btn-primary:hover { background: var(--mf-primary-dark); border-color: var(--mf-primary-dark); }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-suspended { background: #fef3c7; color: #92400e; }
        .badge-deleted { background: #fecaca; color: #991b1b; }
        .badge-pending { background: #e0e7ff; color: #3730a3; }
        .table th { font-size: 0.8rem; text-transform: uppercase; color: #64748b; font-weight: 600; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        // Mobile sidebar toggle
        document.addEventListener('DOMContentLoaded', function() {
            const toggler = document.getElementById('sidebarToggle');
            if (toggler) {
                toggler.addEventListener('click', function() {
                    document.querySelector('.sidebar').classList.toggle('show');
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
