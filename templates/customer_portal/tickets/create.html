{% extends "customer_portal/base.html" %}

{% block page_title %}Nouveau ticket{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Sujet</label>
                {{ form.subject }}
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Catégorie</label>
                    {{ form.category }}
                </div>
                <div class="col-md-6">
                    <label class="form-label">Priorité</label>
                    {{ form.priority }}
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                {{ form.message }}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Envoyer</button>
                <a href="{% url 'support:ticket_list' %}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
