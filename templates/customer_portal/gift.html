{% extends "customer_portal/base.html" %}

{% block page_title %}Offrir un abonnement{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <div class="text-center mb-4">
            <i class="bi bi-gift text-primary" style="font-size: 3rem;"></i>
            <h4 class="mt-2">Offrir un abonnement</h4>
            <p class="text-muted">Faites plaisir à un proche en lui offrant l'accès à la musique</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email du destinataire</label>
                <input type="email" name="recipient_email" class="form-control" placeholder="ami@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Choisir une formule</label>
                {% for plan in plans %}
                <div class="form-check border rounded p-3 mb-2">
                    <input class="form-check-input" type="radio" name="plan_id" value="{{ plan.id }}" id="plan_{{ plan.id }}" {% if forloop.first %}checked{% endif %}>
                    <label class="form-check-label d-flex justify-content-between w-100" for="plan_{{ plan.id }}">
                        <span>
                            <strong>{{ plan.name }}</strong>
                            <span class="text-muted small d-block">{{ plan.description|truncatewords:10 }}</span>
                        </span>
                        <span class="fw-bold text-primary">{{ plan.price }}&euro;</span>
                    </label>
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-gift"></i> Offrir cet abonnement
            </button>
        </form>
    </div>
</div>
{% endblock %}
