version: '3.9'

services:
  # ─────────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: monflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-monflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis (cache & sessions)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: monflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - monflow_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # API Backend (Fastify + Prisma)
  # ─────────────────────────────────────────
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: monflow_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monflow_network
    ports:
      - "3001:3001"
    volumes:
      - ./packages/api/prisma:/app/prisma

  # ─────────────────────────────────────────
  # Frontend Web (Next.js)
  # ─────────────────────────────────────────
  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-MonFlow}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: monflow_web
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    networks:
      - monflow_network
    ports:
      - "3000:3000"

  # ─────────────────────────────────────────
  # Navidrome (serveur de musique)
  # NOTE: Si Navidrome est déjà installé, commentez ce service
  # et ajustez NAVIDROME_URL dans .env pour pointer vers l'instance existante
  # ─────────────────────────────────────────
  navidrome:
    image: deluan/navidrome:latest
    container_name: monflow_navidrome
    restart: unless-stopped
    user: "1000:1000"
    environment:
      ND_SCANSCHEDULE: "1h"
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: "24h"
      ND_BASEURL: ""
      ND_ENABLETRANSCODINGCONFIG: "true"
      ND_DEFAULTTHEME: "Dark"
      ND_LASTFM_ENABLED: "true"
      ND_SPOTIFY_ID: ""
      ND_SPOTIFY_SECRET: ""
    volumes:
      - ./data/navidrome:/data
      - ${MUSIC_FOLDER:-./data/music}:/music:ro
    networks:
      - monflow_network
    ports:
      - "4533:4533"

  # ─────────────────────────────────────────
  # Deemix (téléchargement via Deezer)
  # NOTE: Si Deemix est déjà installé, commentez ce service
  # ─────────────────────────────────────────
  deemix:
    image: registry.gitlab.com/bockiii/deemix-docker:latest
    container_name: monflow_deemix
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      UMASK_SET: "022"
      DEEMIX_SINGLE_USER: "true"
    volumes:
      - ./data/deemix:/config
      - ${MUSIC_FOLDER:-./data/music}:/downloads
    networks:
      - monflow_network
    ports:
      - "6595:6595"

  # ─────────────────────────────────────────
  # Nginx (reverse proxy)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: monflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - api
    networks:
      - monflow_network

  # ─────────────────────────────────────────
  # Worker (tâches planifiées : facturation, suspension)
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./packages/api
      dockerfile: Dockerfile.worker
    container_name: monflow_worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monflow_network

networks:
  monflow_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
